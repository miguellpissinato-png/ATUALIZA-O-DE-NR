name: Monitor Diário de NRs

on:
  schedule:
    # Roda de segunda a sexta às 06:17 no horário de São Paulo/Brasília
    # Evita o minuto 00, pois o GitHub pode atrasar ou descartar execuções em horários de pico.
    - cron: "17 6 * * 1-5"
      timezone: "America/Sao_Paulo"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor-diario-nrs
  cancel-in-progress: false

jobs:
  monitorar-nrs:
    name: Verificar alterações nas NRs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar monitor de NRs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA_APP: ${{ secrets.EMAIL_SENHA_APP }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
        run: python scripts/monitor_nr.py

      - name: Registrar última verificação no log
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime
          from zoneinfo import ZoneInfo

          agora = datetime.now(ZoneInfo("America/Sao_Paulo"))

          registro = {
              "data": agora.strftime("%Y-%m-%d"),
              "hora": agora.strftime("%H:%M:%S"),
              "data_hora": agora.isoformat(),
              "status": "verificacao_concluida",
              "origem": "github_actions"
          }

          caminhos = [
              Path("log.json"),
              Path("data/log.json")
          ]

          for caminho in caminhos:
              caminho.parent.mkdir(parents=True, exist_ok=True)

              try:
                  if caminho.exists() and caminho.stat().st_size > 0:
                      conteudo = json.loads(caminho.read_text(encoding="utf-8"))
                      if isinstance(conteudo, list):
                          logs = conteudo
                      else:
                          logs = [conteudo]
                  else:
                      logs = []
              except Exception:
                  logs = []

              logs.append(registro)

              # Mantém somente os últimos 100 registros
              logs = logs[-100:]

              caminho.write_text(
                  json.dumps(logs, ensure_ascii=False, indent=2),
                  encoding="utf-8"
              )

          print("Log atualizado com sucesso.")
          PY

      - name: Salvar dados atualizados no repositório
        run: |
          git config user.name "monitor-nr-bot"
          git config user.email "bot@monitor-nr"

          git add data/
          git add log.json

          if git diff --staged --quiet; then
            echo "Nenhuma alteração encontrada. Nada para commitar."
          else
            git commit -m "chore: atualiza dados NRs $(date +'%Y-%m-%d')"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
